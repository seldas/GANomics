# GANomics Training Configuration for NCI60 Dataset (HG-U133 Plus 2.0)

# Model Parameters
model:
  input_nc: 8784
  output_nc: 8784
  lambda_A: 10.0
  lambda_B: 10.0
  lambda_feedback: 10.0
  lambda_idt: 0.5
  gan_mode: 'lsgan'

# Optimizer Parameters
optimizer:
  lr: 0.0002
  beta1: 0.5
  beta2: 0.999

# Training Parameters
train:
  n_epochs: 500
  n_epochs_decay: 200
  batch_size: 1
  device: 'cuda:0'
  seed: 42
  print_freq: 5
  save_epoch_freq: 50

# Dataset Parameters
dataset:
  path_A: 'dataset/NCI60/NCI601_ag.tsv'
  path_B: 'dataset/NCI60/NCI601_rs.tsv'

# Output Parameters
output:
  checkpoints_dir: 'results/1_Training/checkpoints'
  name: 'NCI60_1_GANomics_50'
  logs_dir: 'results/1_Training/logs'


default_ablation:
  size: 50
  beta: 10.0
  lambda: 10.0

