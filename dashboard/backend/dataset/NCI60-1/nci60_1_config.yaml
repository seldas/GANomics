dataset:
  max_samples: 59
  path_A: dataset/NCI60-1/df_ag.tsv
  path_B: dataset/NCI60-1/df_rs.tsv
default_ablation:
  beta: 10.0
  lambda: 10.0
  size: 50
metadata:
  description: Dataset for NCI60 project (subset-1).
  genes: 8784
  name: NCI60-1
  samples: 59
model:
  gan_mode: lsgan
  input_nc: 8784
  lambda_A: 10.0
  lambda_B: 10.0
  lambda_feedback: 10.0
  lambda_idt: 0.5
  output_nc: 8784
optimizer:
  beta1: 0.5
  beta2: 0.999
  lr: 0.0002
output:
  checkpoints_dir: results/1_Training/checkpoints
  logs_dir: results/1_Training/logs
  name: NCI60_1_GANomics_50
train:
  batch_size: 1
  device: cuda:0
  n_epochs: 500
  n_epochs_decay: 200
  print_freq: 5
  save_epoch_freq: 50
  seed: 42
