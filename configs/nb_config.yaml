# GANomics Training Configuration for Neuroblastoma Dataset

# Model Parameters
model:
  input_nc: 10042
  output_nc: 10042
  lambda_A: 10.0
  lambda_B: 10.0
  lambda_feedback: 10.0
  lambda_idt: 0.5
  gan_mode: 'lsgan'

# Optimizer Parameters
optimizer:
  lr: 0.0002
  beta1: 0.5
  beta2: 0.999

# Training Parameters
train:
  n_epochs: 50
  n_epochs_decay: 50
  batch_size: 1
  device: 'cuda:0'
  seed: 42
  print_freq: 10
  save_epoch_freq: 10
  explosion_factor: 3.0

# Dataset Parameters
dataset:
  path_A: 'dataset/NB/NB_AG.csv'
  path_B: 'dataset/NB/NB_NGS.csv'
  max_samples: 500
  force_index_mapping: true

# Output Parameters
output:
  checkpoints_dir: 'results/checkpoints'
  name: 'NB_GANomics_50'
  logs_dir: 'results/logs'
