# GANomics Training Configuration for NCI60 Dataset (HG-U95 A-E)

# Model Parameters
model:
  input_nc: 6521
  output_nc: 6521
  lambda_A: 10.0
  lambda_B: 10.0
  lambda_feedback: 10.0
  lambda_idt: 0.5
  gan_mode: 'lsgan'

# Optimizer Parameters
optimizer:
  lr: 0.0002
  beta1: 0.5
  beta2: 0.999

# Training Parameters
train:
  n_epochs: 200
  n_epochs_decay: 200
  batch_size: 1
  device: 'cuda:0'
  seed: 42
  print_freq: 5
  save_epoch_freq: 50

# Dataset Parameters
dataset:
  path_A: 'dataset/NCI60/NCI603_ag.tsv'
  path_B: 'dataset/NCI60/NCI603_rs.tsv'

# Output Parameters
output:
  checkpoints_dir: 'results/checkpoints'
  name: 'NCI60_3_GANomics'
  logs_dir: 'results/logs'
